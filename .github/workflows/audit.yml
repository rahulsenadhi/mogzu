name: audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  abstraction-layers:
    name: Abstraction-layer audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run abstraction-layer audit
        working-directory: MogzuApplication
        run: bash scripts/audit-abstraction-layers.sh

  rls-smoke:
    name: RLS smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install supabase-js (no full install)
        working-directory: MogzuApplication
        run: npm install --no-save @supabase/supabase-js

      - name: Run RLS smoke test
        working-directory: MogzuApplication
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/rls-smoke-test.mjs
